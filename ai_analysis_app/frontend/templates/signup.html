{% extends "base.html" %}
{% block title %}Sign Up | AI Risk Intelligence{% endblock %}
{% block content %}
<section class="auth-wrap section"><form class="auth-card glass reveal" id="signupForm"><div class="eyebrow">Create account</div><h1>Sign up</h1><p>Your account stores analysis runs securely in PostgreSQL.</p><label>Name<input type="text" name="name" required placeholder="Mary Jean"></label><label>Email<input type="email" name="email" required placeholder="you@example.com"></label><label>Password<input type="password" name="password" minlength="6" required placeholder="At least 6 characters"></label><button class="btn full" type="submit">Create account</button><p class="muted">Already registered? <a href="/login">Login</a></p></form></section>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/auth.js') }}"></script>{% endblock %}
