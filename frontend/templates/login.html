{% extends "base.html" %}
{% block title %}Login | AI Risk Intelligence{% endblock %}
{% block content %}
<section class="auth-wrap section"><form class="auth-card glass reveal" id="loginForm"><div class="eyebrow">Welcome back</div><h1>Login</h1><p>Access the AI model and your recent analysis history.</p><label>Email<input type="email" name="email" required placeholder="you@example.com"></label><label>Password<input type="password" name="password" required placeholder="••••••••"></label><button class="btn full" type="submit">Login</button><p class="muted">No account? <a href="/signup">Create one</a></p></form></section>
